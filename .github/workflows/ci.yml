name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install XML validation tools
        run: sudo apt-get update && sudo apt-get install -y libxml2-utils

      - name: Install dependencies
        run: npm ci

      - name: Run tests (CI)
        run: npm run test-ci
        env:
          CI: true

  build-static:
    name: Run build-static smoke
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build static data
        run: npm run build-static
        env:
          CI: true
          KALLIOPE_SKIP_ELASTICSEARCH: true
          KALLIOPE_SKIP_IMAGE_THUMBNAILS: true
          KALLIOPE_SHARP_CACHE_MEMORY: 64
          KALLIOPE_SHARP_CONCURRENCY: 1

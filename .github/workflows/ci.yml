name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: Run tests (CI)
        run: npm run test-ci
        env:
          CI: true

  build-static:
    name: Run build-static
    runs-on: ubuntu-latest
    services:
      elasticsearch:
        image: docker.elastic.co/elasticsearch/elasticsearch:7.17.20
        ports:
          - 9200:9200
        env:
          discovery.type: single-node
          xpack.security.enabled: "false"
          xpack.ml.enabled: "false"
          ES_JAVA_OPTS: -Xms512m -Xmx512m
    strategy:
      matrix:
        node-version: [20.x]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Wait for Elasticsearch
        run: node tools/wait-for-elasticsearch.js
        env:
          ELASTICSEARCH_URL: http://localhost:9200

      - name: Build static data
        run: npm run build-static
        env:
          CI: true
          ELASTICSEARCH_URL: http://localhost:9200
          KALLIOPE_ELASTICSEARCH_CONCURRENCY: 1
          KALLIOPE_ELASTICSEARCH_FORCE_REBUILD: true
          KALLIOPE_ELASTICSEARCH_REQUEST_TIMEOUT_MS: 60000
          KALLIOPE_SHARP_CACHE_MEMORY: 64
          KALLIOPE_SHARP_CONCURRENCY: 1
          KALLIOPE_THUMBNAIL_CONCURRENCY: 4

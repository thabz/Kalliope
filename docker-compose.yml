services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.20
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      xpack.ml.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - esdata:/usr/share/elasticsearch/data

  app:
    build:
      context: .
    restart: unless-stopped
    environment:
      ELASTICSEARCH_URL: http://elasticsearch:9200
    ports:
      - "3000:3000"
    depends_on:
      - elasticsearch
    volumes:
      - ./.git:/app/.git:ro
      - ./data:/app/data:ro
      - ./fdirs:/app/fdirs:ro
      - ./public/images:/app/public/images:ro
      - ./public/kunst:/app/public/kunst:ro
      - ./public/generated:/app/public/generated
    command: >
      sh -c "node tools/wait-for-elasticsearch.js &&
      npm run build-static &&
      npm run build &&
      npm start"

volumes:
  esdata:

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.20
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      xpack.ml.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - esdata:/usr/share/elasticsearch/data

  app:
    build:
      context: .
      target: runtime
    restart: unless-stopped
    environment:
      ELASTICSEARCH_URL: http://elasticsearch:9200
    ports:
      - "3000:3000"
    depends_on:
      - elasticsearch
    volumes:
      - ./public:/app/public:ro
    command: >
      sh -c "node tools/wait-for-elasticsearch.js &&
      npm run build &&
      npm start"

  static-builder:
    build:
      context: .
      target: static-builder
    profiles:
      - build
    environment:
      ELASTICSEARCH_URL: http://elasticsearch:9200
      KALLIOPE_THUMBNAIL_CONCURRENCY: 1
    depends_on:
      - elasticsearch
    volumes:
      - ./.git:/app/.git:ro
      - ./caches:/app/caches
      - ./data:/app/data:ro
      - ./fdirs:/app/fdirs:ro
      - ./public:/app/public
    command: >
      sh -c "node tools/wait-for-elasticsearch.js &&
      npm run build-static"

volumes:
  esdata:
